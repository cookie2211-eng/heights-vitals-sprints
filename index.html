<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Heights · Vitals · Creative Sprint Assessment</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-annotation/3.0.1/chartjs-plugin-annotation.min.js"></script>
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f6f3;--bg3:#f0ede8;
  --rule:rgba(0,0,0,.08);--rule2:rgba(0,0,0,.13);
  --ink:#1a1a18;--ink2:rgba(26,26,24,.62);--ink3:rgba(26,26,24,.38);
  --blue:#1a5fa8;--blue-lt:rgba(26,95,168,.08);--blue-bd:rgba(26,95,168,.2);
  --green:#3b6d11;--green-lt:rgba(59,109,17,.08);--green-bd:rgba(59,109,17,.2);
  --amber:#854f0b;--amber-lt:rgba(133,79,11,.08);--amber-bd:rgba(133,79,11,.2);
  --red:#a32d2d;--red-lt:rgba(163,45,45,.08);
  --radius:8px;--radius-lg:12px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);
  font-size:13px;line-height:1.5;padding:40px 48px 80px;max-width:1100px;margin:0 auto;}
.page-hdr{display:flex;align-items:flex-end;justify-content:space-between;
  border-bottom:1px solid var(--rule2);padding-bottom:20px;margin-bottom:36px;}
.page-hdr-l .eyebrow{font-size:11px;font-weight:500;letter-spacing:.12em;
  text-transform:uppercase;color:var(--ink3);margin-bottom:6px;}
.page-hdr-l h1{font-family:'DM Serif Display',serif;font-size:32px;font-weight:400;line-height:1.1;color:var(--ink);}
.page-hdr-l h1 em{font-style:italic;color:#378ADD;}
.page-hdr-r{text-align:right;font-size:11px;color:var(--ink3);line-height:1.9;}
.page-hdr-r strong{color:var(--ink2);}.page-hdr-r .si{color:#3b6d11;}.page-hdr-r .so{color:#a32d2d;}
.sec{display:flex;align-items:baseline;gap:12px;margin:32px 0 14px;
  padding-bottom:8px;border-bottom:1px solid var(--rule);}
.sec h2{font-family:'DM Serif Display',serif;font-size:17px;font-weight:400;color:var(--ink);}
.sec span{font-size:11px;color:var(--ink3);}
.card{background:var(--bg2);border:1px solid var(--rule);border-radius:var(--radius-lg);padding:18px 20px;}
.fw-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:28px;}
.fw-tile{background:var(--bg);border:1px solid var(--rule);border-radius:var(--radius-lg);
  padding:16px 18px;border-top:3px solid transparent;}
.fw-tile.blue{border-top-color:#378ADD;}.fw-tile.amber{border-top-color:#EF9F27;}.fw-tile.green{border-top-color:#639922;}
.fw-window{font-size:15px;font-weight:500;margin-bottom:4px;color:var(--ink);}
.fw-action{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
.fw-tile.blue .fw-action{color:var(--blue);}.fw-tile.amber .fw-action{color:var(--amber);}.fw-tile.green .fw-action{color:var(--green);}
.fw-desc{font-size:12px;color:var(--ink2);line-height:1.55;}
.why-box{background:var(--bg);border:1px solid var(--rule);border-radius:var(--radius-lg);padding:20px 22px;margin-bottom:28px;}
.why-title{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin-bottom:14px;}
.why-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px;}
.wstat{background:var(--bg2);border:1px solid var(--rule);border-radius:var(--radius);padding:12px 14px;text-align:center;}
.wstat-val{font-size:22px;font-weight:500;line-height:1;margin-bottom:5px;color:var(--ink);}
.wstat-lbl{font-size:10px;color:var(--ink3);line-height:1.4;}
.chart-wrap{position:relative;}
.lc-divider{height:1px;background:var(--rule);margin:18px 0;}
.lc-headline{font-size:13px;font-weight:500;margin-bottom:10px;color:var(--ink);}
.lc-sub{font-size:11px;color:var(--ink2);margin-bottom:14px;line-height:1.6;}
.lc-tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.lc-tile{border-radius:var(--radius);padding:12px 14px;text-align:center;}
.lc-tile.identify{background:var(--blue-lt);border:1px solid var(--blue-bd);}
.lc-tile.confirm{background:var(--green-lt);border:1px solid var(--green-bd);}
.lc-tile.scale{background:var(--amber-lt);border:1px solid var(--amber-bd);}
.lc-val{font-size:22px;font-weight:500;line-height:1;margin-bottom:4px;color:var(--ink);}
.lc-lbl{font-size:11px;font-weight:600;margin-bottom:4px;}
.lc-tile.identify .lc-lbl{color:var(--blue);}.lc-tile.confirm .lc-lbl{color:var(--green);}.lc-tile.scale .lc-lbl{color:var(--amber);}
.lc-sub2{font-size:10px;color:var(--ink2);line-height:1.45;}
.why-note{font-size:11px;color:var(--ink2);line-height:1.65;border-left:2px solid var(--rule2);padding-left:12px;margin-top:14px;}
.sprint-block{background:var(--bg);border:1px solid var(--rule);border-radius:var(--radius-lg);padding:18px 22px;margin-bottom:18px;}
.sprint-block.gap-block{border-style:dashed;background:var(--bg2);padding:12px 22px;margin-bottom:18px;}
.sprint-block.pre-block{background:var(--bg2);border-color:var(--rule2);padding:18px 22px;margin-bottom:24px;}
.sprint-hdr{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--rule);}
.sprint-block.gap-block .sprint-hdr{border-bottom:none;padding-bottom:0;margin-bottom:6px;}
.sprint-name{font-size:15px;font-weight:600;color:var(--ink);}.sprint-name.muted{color:var(--ink2);font-weight:500;}
.sprint-dates{font-size:11px;color:var(--ink3);text-align:right;line-height:1.6;white-space:nowrap;}
/* Stat grid — 3 visual groups split by larger gaps: inputs | outcomes | efficiency */
.sprint-stats{display:grid;grid-template-columns:1fr 1fr 18px 1fr 1fr 1fr 18px 1fr;gap:8px;margin-bottom:14px;align-items:stretch;}
.stat-spacer{background:transparent;}
.sstat{text-align:center;background:var(--bg2);border:1px solid var(--rule);border-radius:var(--radius);padding:10px 6px;display:flex;flex-direction:column;justify-content:center;}
.sstat-val{font-size:16px;font-weight:500;color:var(--ink);line-height:1.1;}
.sstat-lbl{font-size:9px;color:var(--ink3);margin-top:4px;line-height:1.3;letter-spacing:.02em;}
.sstat-prov{font-size:9px;color:var(--amber);margin-top:3px;font-style:italic;}
/* Supporting stats (ads, spend, CPA): muted */
.sstat.support{background:transparent;}
.sstat.support .sstat-val{color:var(--ink2);font-weight:400;font-size:15px;}
/* Primary outcome stats (winners, hit rate, scalers): emphasised */
.sstat.primary{background:var(--bg);border-color:var(--rule2);padding:12px 6px;}
.sstat.primary .sstat-val{font-size:20px;font-weight:600;}
.sstat.winner.primary{border-top:2px solid var(--blue);}
.sstat.winner.primary .sstat-val{color:var(--blue);}
.sstat.scaler.primary{border-top:2px solid var(--green);}
.sstat.scaler.primary .sstat-val{color:var(--green);}
.sstat.clickable{cursor:pointer;transition:background .15s;position:relative;}
.sstat.clickable:hover{background:var(--bg3);}
.sstat.clickable.scaler.primary:hover{background:rgba(99,153,34,.05);}
.sstat.clickable.winner.primary:hover{background:rgba(55,138,221,.05);}
.sstat.clickable .sstat-val{text-decoration:underline;text-decoration-color:rgba(0,0,0,.15);text-underline-offset:3px;}
.sstat.clickable.primary .sstat-val{text-decoration-color:currentColor;}
.pill{display:inline-flex;align-items:center;font-size:10px;padding:3px 8px;border-radius:12px;
  margin-right:4px;margin-bottom:8px;background:var(--bg2);color:var(--ink2);border:1px solid var(--rule2);}
.badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;margin-left:8px;vertical-align:middle;}
.badge-amber{background:var(--amber-lt);color:var(--amber);}.badge-gray{background:rgba(0,0,0,.05);color:var(--ink3);border:1px solid var(--rule2);}
.pipeline-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:10px 0;}
.pipe-card{border-radius:var(--radius);padding:10px 12px;text-align:center;}
.pipe-card.confirmed{background:var(--green-lt);border:1px solid var(--green-bd);}
.pipe-card.near-strong{background:var(--blue-lt);border:1px solid var(--blue-bd);}
.pipe-card.near-weak{background:var(--amber-lt);border:1px solid var(--amber-bd);}
.pipe-card.cold{background:var(--bg2);border:1px solid var(--rule);}
.pipe-val{font-size:22px;font-weight:500;line-height:1;color:var(--ink);}
.pipe-lbl{font-size:10px;font-weight:600;margin-top:3px;margin-bottom:3px;}
.pipe-card.confirmed .pipe-lbl{color:var(--green);}.pipe-card.near-strong .pipe-lbl{color:var(--blue);}
.pipe-card.near-weak .pipe-lbl{color:var(--amber);}.pipe-card.cold .pipe-lbl{color:var(--ink3);}
.pipe-sub{font-size:10px;color:var(--ink3);line-height:1.4;}
.assess-box{border-radius:var(--radius);padding:10px 14px;margin-top:10px;}
.assess-box.done{background:var(--green-lt);border:1px solid var(--green-bd);}
.assess-box.partial{background:var(--amber-lt);border:1px solid var(--amber-bd);}
.assess-box.pending{background:var(--blue-lt);border:1px solid var(--blue-bd);}
.assess-box.early{background:var(--bg2);border:1px solid var(--rule);}
.assess-lbl{font-size:11px;font-weight:500;margin-bottom:3px;}
.assess-box.done .assess-lbl{color:var(--green);}.assess-box.partial .assess-lbl{color:var(--amber);}
.assess-box.pending .assess-lbl{color:var(--blue);}.assess-box.early .assess-lbl{color:var(--ink2);}
.assess-meta{font-size:10px;color:var(--ink2);line-height:1.55;}
.pre-windows{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin:10px 0 6px;}
.pre-win-card{background:var(--bg);border:1px solid var(--rule);border-radius:var(--radius);padding:10px 12px;}
.pre-win-label{font-size:10px;color:var(--ink3);margin-bottom:5px;line-height:1.35;}
.pre-win-stat{font-size:15px;font-weight:500;color:var(--ink);}
.pre-win-sub{font-size:10px;color:var(--ink3);margin-top:2px;}
/* Winners / scalers drawer */
.winners-drawer{display:none;margin-top:12px;border-top:1px solid var(--rule);padding-top:12px;}
.winners-drawer.open{display:block;}
.drawer-title{font-size:11px;color:var(--ink2);margin-bottom:10px;font-weight:500;letter-spacing:.02em;}
.winners-drawer table{width:100%;border-collapse:collapse;font-size:11px;}
.winners-drawer th{text-align:left;font-size:10px;font-weight:500;text-transform:uppercase;
  letter-spacing:.06em;color:var(--ink3);padding:0 10px 8px 0;border-bottom:1px solid var(--rule);}
.winners-drawer th:last-child,.winners-drawer td:last-child{text-align:right;padding-right:0;}
.winners-drawer td{padding:7px 10px 7px 0;border-bottom:1px solid var(--rule);color:var(--ink2);vertical-align:top;}
.winners-drawer tr:last-child td{border-bottom:none;}
.winners-drawer td.name{color:var(--ink);max-width:420px;}
.winners-drawer td.spend{font-weight:500;color:var(--ink);white-space:nowrap;}
.winners-drawer td.cpa{white-space:nowrap;}
.winners-drawer td.days{white-space:nowrap;}
.launch-legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:10px;font-size:11px;color:var(--ink3);}
.leg-item{display:flex;align-items:center;gap:5px;}
.leg-sq{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.leg-line{width:14px;border-top:1.5px dashed rgba(0,0,0,.25);}
.gap-note{font-size:11px;color:var(--ink2);line-height:1.65;padding:4px 0;}
.footer{border-top:1px solid var(--rule);padding-top:14px;margin-top:48px;
  display:flex;justify-content:space-between;font-size:10px;color:var(--ink3);}
.loading{text-align:center;padding:60px 0;font-size:13px;color:var(--ink3);}

</style>
</head>
<body>
<div id="root"><div class="loading">Loading data...</div></div>
<script>
const PRODUCT = 'vitals';
const COL_MAP = {"pre": "#aaaaaa", "s1": "#378ADD", "gap": "#bbbbbb", "s2": "#639922", "s3": "#EF9F27", "s4": "#D85A30"};
const LEGEND = [{"cls": "leg-sq", "style": "background:#aaaaaa", "label": "Pre-sprint"}, {"cls": "leg-sq", "style": "background:#378ADD", "label": "Sprint 1 (18 Feb\u201318 Mar)"}, {"cls": "leg-sq", "style": "background:#bbbbbb;outline:1px dashed #999;outline-offset:1px", "label": "Gap (19\u201331 Mar)"}, {"cls": "leg-sq", "style": "background:#639922", "label": "Sprint 2 (1\u201314 Apr)"}, {"cls": "leg-sq", "style": "background:#EF9F27", "label": "Sprint 3 (15\u201328 Apr)"}, {"cls": "leg-sq", "style": "background:#D85A30", "label": "Sprint 4 (29 Apr+)"}, {"cls": "leg-line", "style": "", "label": "New CS joined 16 Mar"}];

fetch('vitals-data.json')
  .then(r => r.json())
  .then(DATA => render(DATA))
  .catch(e => document.getElementById('root').innerHTML = '<div class="loading">Error loading data.json — make sure the file is in the same folder.</div>');

function fmt(n){ return n ? '£'+n.toLocaleString() : '—'; }
function fmtK(n){ return n ? '£'+(n/1000).toFixed(0)+'K' : '—'; }

function render(DATA) {
  const T = DATA.threshold;
  const S = DATA.sprints;
  const TM = DATA.timing;
  const LC = DATA.lifecycle;
  const CH = DATA.chart;
  const prod_label = PRODUCT === 'vitals' ? 'Vitals' : 'Biotic';
  const unit_label = PRODUCT === 'vitals' ? '2-week' : '12-day';
  const early_desc = PRODUCT === 'vitals'
    ? 'Monitor CPAs and spend allocation. Strong performance here = potential unicorn. Act — don\'t wait for the 30-day window.'
    : 'Biotic winners emerge faster — median '+TM.median_win+' days. Strong spend and CPA here means act now, not in two weeks.';
  const lc_headline = PRODUCT === 'vitals'
    ? 'Identification is just the start — '+LC.d30plus_pct+'% of a winner\'s lifetime spend comes after day 30'
    : 'Biotic winners peak fast — '+LC.pre30_pct+'% of spend lands in the first 30 days';
  const lc_note = PRODUCT === 'vitals'
    ? 'An ad identified as a winner at day '+TM.median_win+' still has 6–9 weeks of prime scaling ahead — '+LC.d30plus_pct+'% of its lifetime value. Identifying late doesn\'t just miss a metric: it directly costs scaling budget.'
    : 'Biotic winners peak fast and drop off sharply. '+LC.pre30_pct+'% of spend lands within 30 days — identify within 2 weeks and scale immediately. The post-30d tail is short ('+LC.d30plus_pct+'%), so late identification means missing the window entirely.';
  const scale_lbl = PRODUCT === 'vitals' ? 'Peak ROI window' : 'Tail — scale fast';

  let html = `
<div class="page-hdr">
  <div class="page-hdr-l"><div class="eyebrow">Heights · Meta UK · Vitals⁺</div>
    <h1>Vitals⁺ · Creative <em>Sprint Assessment</em></h1></div>
  <div class="page-hdr-r"><strong>Heights · Meta UK</strong><br>Data: Sep 2025 – 26 Apr 2026<br>
    Winner = ≥£3,000 spend in first 30 days<br>
    Scaler = winner with ≥£6,000 by 6 weeks<br>
    <span class="si">Includes:</span> Vitals⁺ · Free Magnesium offer ads<br>
    <span class="so">Excludes:</span> Intro Bundle · standalone Magnesium⁺ · Biotic · Thrive</div>
</div>
<div class="sec"><h2>1 · Assessment framework</h2><span>How to read creative performance</span></div>
<div class="fw-grid">
  <div class="fw-tile blue"><div class="fw-window">Days 1–14</div><div class="fw-action">Early signal</div><div class="fw-desc">${early_desc}</div></div>
  <div class="fw-tile amber"><div class="fw-window">Days 14–30</div><div class="fw-action">Formal winner assessment</div><div class="fw-desc">Decide what to scale and cut. You're assessing the previous sprint's output while the current sprint is in production.</div></div>
  <div class="fw-tile green"><div class="fw-window">Weeks 5–10</div><div class="fw-action">Peak ROI window</div><div class="fw-desc">Maximum payoff on confirmed winners. The return on creative investment made 4–6 weeks prior.</div></div>
</div>

<div class="sec"><h2>2 · Why 6 weeks is the right assessment window</h2><span>Based on ${prod_label} historical winner data</span></div>
<div class="why-box">
  <div class="why-title">Winner identification timing · ${TM.total_winners} ${prod_label} winners</div>
  <div class="why-stats">
    <div class="wstat"><div class="wstat-val">${TM.median_win}d</div><div class="wstat-lbl">Median days to winner confirmation (≥${fmt(T)})</div></div>
    <div class="wstat"><div class="wstat-val">${TM.median_early}d</div><div class="wstat-lbl">Median days to first ${fmt(T*0.3)} — early signal point</div></div>
    <div class="wstat"><div class="wstat-val">${TM.pct_d30}%</div><div class="wstat-lbl">of winners confirmed within 30 days of launch</div></div>
    <div class="wstat"><div class="wstat-val">${TM.pct_d14}%</div><div class="wstat-lbl">confirmed by day 14 — nearly half visible in one sprint</div></div>
  </div>
  <div class="chart-wrap" style="height:110px"><canvas id="distChart" role="img" aria-label="Days to winner confirmation distribution">Winner timing distribution.</canvas></div>
  <div class="lc-divider"></div>
  <div class="lc-headline">${lc_headline}</div>
  <div class="lc-sub">Average spend profile across ${LC.n_winners} ${prod_label} winners with ≥${fmt(LC.floor)} lifetime spend.</div>
  <div class="lc-tiles">
    <div class="lc-tile identify"><div class="lc-val">${LC.d0_14_pct}%</div><div class="lc-lbl">Days 0–14</div><div class="lc-sub2">Avg ${fmt(LC.d0_14_avg)} · signal emerging</div></div>
    <div class="lc-tile confirm"><div class="lc-val">${LC.d14_30_pct}%</div><div class="lc-lbl">Days 14–30</div><div class="lc-sub2">Avg ${fmt(LC.d14_30_avg)} · winner confirmed</div></div>
    <div class="lc-tile scale"><div class="lc-val">${LC.d30plus_pct}%</div><div class="lc-lbl">Day 30+</div><div class="lc-sub2">Avg ${fmt(LC.d30plus_avg)} · ${scale_lbl}</div></div>
  </div>
  <div class="chart-wrap" style="height:120px"><canvas id="lcChart" role="img" aria-label="Average spend per winner by week from launch">Lifecycle spend profile.</canvas></div>
  <div class="why-note">${lc_note}</div>
</div>

<div class="sec"><h2>3 · Sprint-by-sprint breakdown</h2><span>${prod_label} · winner = ≥${fmt(T)} in first 30d · scaler = winner with ≥${fmt(T*2)} by 6w</span></div>
`;

  let sprint_num = 0;
  S.forEach(sp => {
    const st = sp.stats;
    if (sp.id === 'baseline') {
      html += `<div class="sprint-block pre-block">
  <div class="sprint-hdr">
    <div><span class="sprint-name muted">Pre-sprint baseline</span>
      <span style="font-size:10px;color:var(--ink3);margin-left:8px">${sp.sublabel}</span></div>
  </div>
  <div style="font-size:11px;color:var(--ink2);margin-bottom:10px;line-height:1.6">${sp.note}</div>
  <div class="pre-windows">
    <div class="pre-win-card"><div class="pre-win-label">Avg ads per ${unit_label} window</div><div class="pre-win-stat">~${st.ads_norm}</div><div class="pre-win-sub">total ${st.ads.toLocaleString()}</div></div>
    <div class="pre-win-card"><div class="pre-win-label">Avg spend per ${unit_label} window</div><div class="pre-win-stat">${fmtK(st.spend_norm)}</div><div class="pre-win-sub">total ${fmtK(st.spend)}</div></div>
    <div class="pre-win-card"><div class="pre-win-label">Avg winners per ${unit_label} window</div><div class="pre-win-stat">~${st.winners_norm}</div><div class="pre-win-sub">total ${st.winners}</div></div>
    <div class="pre-win-card"><div class="pre-win-label">Hit rate</div><div class="pre-win-stat">${st.hit_rate}%</div><div class="pre-win-sub">winners ÷ ads launched</div></div>
    <div class="pre-win-card" style="border-top:2px solid var(--green)"><div class="pre-win-label">Scalers per ${unit_label} window</div><div class="pre-win-stat" style="color:var(--green)">~${st.scalers_norm}</div><div class="pre-win-sub">total ${st.scalers} · ≥${fmt(st.scaler_bar)} by 6w</div></div>
    <div class="pre-win-card"><div class="pre-win-label">Blended CPA</div><div class="pre-win-stat">${fmt(st.cpa)}</div><div class="pre-win-sub">steady-state benchmark</div></div>
  </div></div>`;
      return;
    }
    if (sp.id === 'gap') {
      html += `<div class="sprint-block gap-block">
  <div class="sprint-hdr"><span class="sprint-name muted">${sp.label}</span>
    <div class="sprint-dates">${sp.sublabel}</div></div>
  <div class="gap-note">${sp.note} ${st.ads} ads launched — existing campaigns running. ${st.winners} winners at ${fmt(st.cpa)} CPA.</div>
</div>`;
      return;
    }
    sprint_num++;
    if (!st) {
      html += `<div class="sprint-block">
  <div class="sprint-hdr">
    <div><span class="sprint-name">${sp.label}</span><span class="badge badge-gray">no data yet</span></div>
    <div class="sprint-dates">${sp.sublabel}</div>
  </div>
  <div class="assess-box early">
    <div class="assess-lbl">Full assessment complete: ~${sp.assess_date} · ${sp.assess_wks} from sprint start</div>
    <div class="assess-meta">Data window not yet open</div>
  </div></div>`;
      return;
    }

    // Assessment status
    let assess_class, assess_label, assess_meta, badge;
    if (sprint_num === 1) {
      assess_class = 'done';
      assess_label = 'Full assessment complete · 30d window closed ' + sp.assess_date;
      assess_meta = 'Sprint length + 30 days = ' + sp.assess_wks + ' from start · ' + st.winners + ' confirmed winners · figures are final';
      badge = '';
    } else if (sprint_num === 2) {
      assess_class = 'partial';
      assess_label = 'Full assessment complete: ~' + sp.assess_date + ' · ' + sp.assess_wks + ' from sprint start';
      assess_meta = st.near_good + ' near-winners with good CPA still in window · realistic final count ' + (st.winners+2) + '–' + (st.winners+st.near_good) + ' winners · CPA ' + fmt(st.cpa);
      badge = '<span class="badge badge-amber">window open</span>';
    } else if (sprint_num === 3) {
      assess_class = 'pending';
      assess_label = 'Full assessment complete: ~' + sp.assess_date + ' · ' + sp.assess_wks + ' from sprint start';
      assess_meta = 'Most ads only days old · current ' + st.hit_rate + '% hit rate not yet meaningful · first real read ~mid-May';
      badge = '<span class="badge badge-gray">too early to assess</span>';
    } else {
      assess_class = 'pending';
      assess_label = 'Full assessment complete: ~' + sp.assess_date + ' · ' + sp.assess_wks + ' from sprint start';
      assess_meta = 'Data window open · early signals emerging';
      badge = '<span class="badge badge-gray">early data</span>';
    }

    const note_html = sp.note ? `<div style="margin-bottom:10px"><span class="pill">${sp.note}</span></div>` : '';
    const winners_drawer_id = 'winners-'+sp.id;
    const scalers_drawer_id = 'scalers-'+sp.id;

    // Winners stat — clickable if there are winners
    const winners_stat = st.winners > 0
      ? `<div class="sstat winner primary clickable" onclick="toggleDrawer('${winners_drawer_id}','${scalers_drawer_id}')" title="Click to see winners">
          <div class="sstat-val">${st.winners}</div><div class="sstat-lbl">winners (≥${fmt(T)} by 30d)</div></div>`
      : `<div class="sstat winner primary"><div class="sstat-val">${st.winners}</div><div class="sstat-lbl">winners (≥${fmt(T)} by 30d)</div></div>`;

    // Scalers stat — clickable if there are scalers
    const scalers_stat = st.scalers > 0
      ? `<div class="sstat scaler primary clickable" onclick="toggleDrawer('${scalers_drawer_id}','${winners_drawer_id}')" title="Click to see scalers">
          <div class="sstat-val">${st.scalers}</div><div class="sstat-lbl">scalers (≥${fmt(st.scaler_bar)} by 6w)</div>${st.scalers_complete ? '' : '<div class="sstat-prov">provisional</div>'}</div>`
      : `<div class="sstat scaler primary"><div class="sstat-val">${st.scalers}</div><div class="sstat-lbl">scalers (≥${fmt(st.scaler_bar)} by 6w)</div>${st.scalers_complete ? '' : '<div class="sstat-prov">provisional</div>'}</div>`;

    // Pipeline for sprint 2
    let pipeline_html = '';
    if (sprint_num === 2 && st.near_good != null) {
      pipeline_html = `<div style="font-size:11px;font-weight:500;color:var(--ink2);margin-bottom:8px">Winner pipeline · as of Apr 26</div>
<div class="pipeline-row">
  <div class="pipe-card confirmed"><div class="pipe-val">${st.winners}</div><div class="pipe-lbl">Confirmed</div><div class="pipe-sub">≥${fmt(T)} spend</div></div>
  <div class="pipe-card near-strong"><div class="pipe-val">${st.near_good}</div><div class="pipe-lbl">Near · good CPA</div><div class="pipe-sub">approaching threshold · CPA on track</div></div>
  <div class="pipe-card near-weak"><div class="pipe-val">${st.near_weak}</div><div class="pipe-lbl">Near · high CPA</div><div class="pipe-sub">approaching threshold · CPA concern</div></div>
  <div class="pipe-card cold"><div class="pipe-val">${st.cold}</div><div class="pipe-lbl">Not scaling</div><div class="pipe-sub">low spend · unlikely to move</div></div>
</div>`;
    }

    // Winners drawer
    let winners_drawer_html = '';
    if (sp.winners_list && sp.winners_list.length > 0) {
      const rows = sp.winners_list.map(w =>
        `<tr><td class="name">${w.name}</td><td class="spend">${fmt(w.spend)}</td><td class="cpa">${w.cpa ? fmt(w.cpa) : '—'}</td><td class="days">${w.days}d</td></tr>`
      ).join('');
      winners_drawer_html = `<div class="winners-drawer" id="${winners_drawer_id}">
  <div class="drawer-title">Winners · ${sp.winners_list.length} ad${sp.winners_list.length===1?'':'s'} that hit ≥${fmt(T)} in their first 30 days</div>
  <table><thead><tr><th>Ad</th><th>Spend (lifetime)</th><th>CPA</th><th>Days since launch</th></tr></thead>
  <tbody>${rows}</tbody></table></div>`;
    }
    // Scalers drawer
    let scalers_drawer_html = '';
    if (sp.scalers_list && sp.scalers_list.length > 0) {
      const rows = sp.scalers_list.map(w =>
        `<tr><td class="name">${w.name}</td><td class="spend">${fmt(w.spend_6w)}</td><td class="spend">${fmt(w.spend)}</td><td class="cpa">${w.cpa ? fmt(w.cpa) : '—'}</td><td class="days">${w.days}d</td></tr>`
      ).join('');
      scalers_drawer_html = `<div class="winners-drawer" id="${scalers_drawer_id}">
  <div class="drawer-title">Scalers · ${sp.scalers_list.length} winner${sp.scalers_list.length===1?'':'s'} that hit ≥${fmt(st.scaler_bar)} by 6 weeks</div>
  <table><thead><tr><th>Ad</th><th>By 6w</th><th>Lifetime</th><th>CPA</th><th>Days since launch</th></tr></thead>
  <tbody>${rows}</tbody></table></div>`;
    }

    html += `<div class="sprint-block">
  <div class="sprint-hdr">
    <div><span class="sprint-name">${sp.label}</span>${badge}</div>
    <div class="sprint-dates">${sp.sublabel}</div>
  </div>
  ${note_html}
  <div class="sprint-stats">
    <div class="sstat support"><div class="sstat-val">${st.ads}</div><div class="sstat-lbl">ads launched</div></div>
    <div class="sstat support"><div class="sstat-val">${fmtK(st.spend)}</div><div class="sstat-lbl">spend</div></div>
    <div class="stat-spacer"></div>
    ${winners_stat}
    <div class="sstat primary"><div class="sstat-val">${st.hit_rate}%</div><div class="sstat-lbl">hit rate</div></div>
    ${scalers_stat}
    <div class="stat-spacer"></div>
    <div class="sstat support"><div class="sstat-val">${fmt(st.cpa)}</div><div class="sstat-lbl">blended CPA</div></div>
  </div>
  ${pipeline_html}
  <div class="assess-box ${assess_class}">
    <div class="assess-lbl">${assess_label}</div>
    <div class="assess-meta">${assess_meta}</div>
  </div>
  ${winners_drawer_html}
  ${scalers_drawer_html}
</div>`;
  });

  html += `
<div class="sec"><h2>4 · Weekly ad launches</h2><span>${prod_label} unique ads by creation date · 2026</span></div>
<div class="card">
  <div class="chart-wrap" style="height:220px">
    <canvas id="launchChart" role="img" aria-label="Weekly ${prod_label} ad launches 2026">Weekly ad launches.</canvas>
  </div>
  <div class="launch-legend">${LEGEND.map(l => `<span class="leg-item"><span class="${l.cls}" style="${l.style}"></span>${l.label}</span>`).join('')}</div>
</div>
<div class="footer"><span>Heights · Meta UK · Vitals · Internal · Apr 2026</span>
  <span>Winner ≥£3,000 in first 30d · Scaler ≥£6,000 by 6w · ad-level Meta data · vitals-data.json</span></div>`;

  document.getElementById('root').innerHTML = html;
  buildCharts(DATA);
}

function toggleDrawer(openId, closeId) {
  // Open one drawer, close the other (winners/scalers are mutually exclusive views)
  const open = document.getElementById(openId);
  const close = closeId ? document.getElementById(closeId) : null;
  if (close) close.classList.remove('open');
  if (open) open.classList.toggle('open');
}
// Backwards compat
function toggleWinners(id) { toggleDrawer(id, null); }

function buildCharts(DATA) {
  const TM = DATA.timing; const LC = DATA.lifecycle; const CH = DATA.chart;
  const TT = {backgroundColor:'rgba(26,26,24,.92)',titleColor:'#f0ede8',bodyColor:'rgba(240,237,232,.75)',
    borderColor:'rgba(0,0,0,.12)',borderWidth:1,padding:10,cornerRadius:4};
  const GC='rgba(0,0,0,.06)'; const TC='rgba(26,26,24,.35)';

  new Chart(document.getElementById('distChart'),{
    type:'bar',
    data:{labels:['Days 0–7','Days 8–14','Days 15–21','Days 22–30','Days 31–45','Days 46–60'],
      datasets:[{data:TM.dist,backgroundColor:['#378ADD','#378ADD','#639922','#639922',
        'rgba(0,0,0,.15)','rgba(0,0,0,.1)'],borderRadius:3,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},
      tooltip:{...TT,callbacks:{label:ctx=>ctx.raw+'% of winners'}},
      annotation:{annotations:{d30:{type:'line',xMin:3.5,xMax:3.5,
        borderColor:'rgba(163,45,45,.7)',borderWidth:1.5,borderDash:[4,3],
        label:{display:true,content:'30d cut-off · '+TM.pct_d30+'% captured',position:'end',
          yAdjust:-8,backgroundColor:'transparent',color:'#a32d2d',font:{size:10,family:'DM Sans'}}}}}
    },scales:{
      x:{ticks:{font:{size:10,family:'DM Sans'},color:TC},grid:{display:false},border:{display:false}},
      y:{ticks:{font:{size:10,family:'DM Sans'},color:TC,callback:v=>v+'%'},grid:{color:GC},border:{display:false},max:40}
    }}
  });

  new Chart(document.getElementById('lcChart'),{
    type:'bar',
    data:{labels:['W1\nd0–7','W2\nd7–14','W3\nd14–21','W4\nd21–30','W5–6\nd30–42','W7–8\nd42–56','W9–10\nd56–70','W11–12\nd70–84'],
      datasets:[{data:LC.band_avgs,backgroundColor:['rgba(26,95,168,.35)','rgba(26,95,168,.35)',
        'rgba(26,95,168,.35)','rgba(26,95,168,.35)','rgba(133,79,11,.3)','rgba(133,79,11,.22)',
        'rgba(0,0,0,.1)','rgba(0,0,0,.07)'],borderRadius:3,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},
      tooltip:{...TT,callbacks:{label:ctx=>'£'+ctx.raw.toLocaleString()+' avg spend in band'}},
      annotation:{annotations:{id30:{type:'line',xMin:3.5,xMax:3.5,
        borderColor:'rgba(163,45,45,.7)',borderWidth:1.5,borderDash:[4,3],
        label:{display:true,content:'Winner identified',position:'start',yAdjust:-8,
          backgroundColor:'transparent',color:'#a32d2d',font:{size:10,family:'DM Sans'}}}}}
    },scales:{
      x:{ticks:{font:{size:9,family:'DM Sans'},color:TC},grid:{display:false},border:{display:false}},
      y:{ticks:{font:{size:10,family:'DM Sans'},color:TC,callback:v=>'£'+v.toLocaleString()},grid:{color:GC},border:{display:false}}
    }}
  });

  const cols = CH.map(d => COL_MAP[d.bucket] || '#aaaaaa');
  const seen = new Set(); const annots = {};
  CH.forEach((d,i) => {
    if (!seen.has(d.bucket) && !['pre','baseline','post'].includes(d.bucket)) {
      seen.add(d.bucket);
      const lmap = {s1:'S1',s2:'S2',s3:'S3',s4:'S4'};
      annots['line_'+d.bucket] = {type:'line',xMin:i-0.5,xMax:i-0.5,
        borderColor:COL_MAP[d.bucket]+'99',borderWidth:1,borderDash:[3,3],
        label:{display:true,content:lmap[d.bucket]||'',position:'start',yAdjust:6,
          backgroundColor:'transparent',color:COL_MAP[d.bucket],font:{size:9,family:'DM Sans'}}};
    }
  });

  new Chart(document.getElementById('launchChart'),{
    type:'bar',
    data:{labels:CH.map(d=>d.label),datasets:[{data:CH.map(d=>d.n),
      backgroundColor:cols,borderRadius:3,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},
      tooltip:{...TT,callbacks:{label:ctx=>ctx.raw+' new ads'}},
      annotation:{annotations:annots}
    },scales:{
      x:{ticks:{font:{size:10,family:'DM Sans'},color:TC,maxRotation:45,autoSkip:false},grid:{display:false},border:{display:false}},
      y:{ticks:{font:{size:10,family:'DM Sans'},color:TC},grid:{color:GC},border:{display:false}}
    }}
  });
}
</script>
</body>
</html>
